{% extends "app/base.html" %}

{% block content %}

<h2>Your Skills</h2>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Level</th>
<th>experience</th>
</tr>

{% for skill in skills %}

<tr>
<td>{{ skill.name }}</td>
<td>{{ skill.level }}</td>
<td>{{ skill.experience }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
